---
anchors:
  environ: &env-def {environ_update: {LANGUAGE: C, LC_ALL: C}, check_rc: false}
  list_ok: &list-ok
    command: [/testbin/kopia, policy, list, --config-file=/etc/kopia/root.config]
    environ: *env-def
    rc: 0
    out: "user@host:/home/user"
    err: ''
  list_empty: &list-empty
    command: [/testbin/kopia, policy, list, --config-file=/etc/kopia/root.config]
    environ: *env-def
    rc: 0
    out: ''
    err: ''

test_cases:
  - id: set_retention_policy
    input:
      state: set
      target: "user@hostname:/home/user"
      config: /etc/kopia/root.config
      retention:
        keep_latest: "10"
        keep_daily: "7"
        keep_weekly: "4"
    output:
      changed: true
    mocks:
      run_command:
        - *list-empty
        - command:
            - /testbin/kopia
            - policy
            - set
            - user@hostname:/home/user
            - --keep-latest
            - "10"
            - --keep-daily
            - "7"
            - --keep-weekly
            - "4"
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *list-ok

  - id: set_global_policy_with_compression
    input:
      state: set
      global_policy: true
      config: /etc/kopia/root.config
      compression: zstd
      files:
        add_ignore:
          - "*.tmp"
          - ".cache"
        ignore_cache_dirs: "true"
    output:
      changed: true
    mocks:
      run_command:
        - *list-empty
        - command:
            - /testbin/kopia
            - policy
            - set
            - --global
            - --add-ignore
            - "*.tmp"
            - --add-ignore
            - .cache
            - --ignore-cache-dirs
            - "true"
            - --compression
            - zstd
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *list-ok

  - id: set_scheduling_policy
    input:
      state: set
      target: "user@hostname:/var/www"
      config: /etc/kopia/root.config
      scheduling:
        times:
          - "02:00"
          - "14:00"
    output:
      changed: true
    mocks:
      run_command:
        - *list-empty
        - command:
            - /testbin/kopia
            - policy
            - set
            - user@hostname:/var/www
            - --snapshot-time
            - "02:00,14:00"
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *list-ok

  - id: show_policy
    input:
      state: shown
      target: "user@hostname:/home/user"
      config: /etc/kopia/root.config
    output:
      changed: false
    mocks:
      run_command:
        - *list-ok
        - command:
            - /testbin/kopia
            - policy
            - show
            - user@hostname:/home/user
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: "Policy for user@hostname:/home/user"
          err: ''
        - *list-ok

  - id: list_policies
    input:
      state: listed
      config: /etc/kopia/root.config
    output:
      changed: false
    mocks:
      run_command:
        - *list-ok
        - command:
            - /testbin/kopia
            - policy
            - list
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: "user@host:/home/user"
          err: ''
        - *list-ok

  - id: delete_policy
    input:
      state: deleted
      target: "user@hostname:/home/user"
      config: /etc/kopia/root.config
    output:
      changed: true
    mocks:
      run_command:
        - *list-ok
        - command:
            - /testbin/kopia
            - policy
            - delete
            - user@hostname:/home/user
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *list-empty

  - id: delete_policy_no_such_policy
    input:
      state: deleted
      target: "user@hostname:/home/user"
      config: /etc/kopia/root.config
    output:
      changed: false
    mocks:
      run_command:
        - *list-empty
        - command:
            - /testbin/kopia
            - policy
            - delete
            - user@hostname:/home/user
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 1
          out: ''
          err: 'no such policy'
        - *list-empty
