---
anchors:
  environ: &env-def {environ_update: {LANGUAGE: C, LC_ALL: C}, check_rc: false}
  status_ok: &status-ok
    command: [/testbin/kopia, repository, status, --config-file=/etc/kopia/root.config]
    environ: *env-def
    rc: 0
    out: "Connected to repository."
    err: ''
  status_empty: &status-empty
    command: [/testbin/kopia, repository, status, --config-file=/etc/kopia/root.config]
    environ: *env-def
    rc: 1
    out: ''
    err: 'repository not connected'

test_cases:
  - id: create_s3
    input:
      state: created
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: s3
        bucket: my-bucket
        access_key: myaccesskey
        secret_access_key: mysecretkey
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - create
            - s3
            - --bucket=my-bucket
            - --access-key=myaccesskey
            - --secret-access-key=mysecretkey
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: create_s3_already_exists
    input:
      state: created
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: s3
        bucket: my-bucket
        access_key: myaccesskey
        secret_access_key: mysecretkey
    output:
      changed: false
    mocks:
      run_command:
        - *status-ok
        - command:
            - /testbin/kopia
            - repository
            - create
            - s3
            - --bucket=my-bucket
            - --access-key=myaccesskey
            - --secret-access-key=mysecretkey
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 1
          out: ''
          err: 'already exists'
        - *status-ok

  - id: create_filesystem
    input:
      state: created
      password: secret
      backend:
        provider: filesystem
        path: /mnt/backup/kopia
    output:
      changed: true
    mocks:
      run_command:
        - command: [/testbin/kopia, repository, status]
          environ: *env-def
          rc: 1
          out: ''
          err: 'repository not connected'
        - command:
            - /testbin/kopia
            - repository
            - create
            - filesystem
            - --path=/mnt/backup/kopia
            - --password=secret
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - command: [/testbin/kopia, repository, status]
          environ: *env-def
          rc: 0
          out: "Connected to repository."
          err: ''

  - id: connect_server
    input:
      state: connected
      password: secret
      config: /etc/kopia/root.config
      url: https://kopia.example.com:51515
      fingerprint_tls: "AA:BB:CC:DD"
      backend:
        provider: server
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - connect
            - --password=secret
            - --server-cert-fingerprint=AA:BB:CC:DD
            - --url=https://kopia.example.com:51515
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: connect_azure
    input:
      state: connected
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: azure
        container: my-container
        storage_account: myaccount
        storage_key: mykey
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - connect
            - azure
            - --container=my-container
            - --storage-account=myaccount
            - --storage-key=mykey
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: disconnect
    input:
      state: disconnected
      config: /etc/kopia/root.config
    output:
      changed: true
    mocks:
      run_command:
        - *status-ok
        - command:
            - /testbin/kopia
            - repository
            - disconnect
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-empty

  - id: sync_s3
    input:
      state: synced
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: s3
        bucket: my-sync-bucket
        access_key: myaccesskey
        secret_access_key: mysecretkey
    output:
      changed: false
    mocks:
      run_command:
        - *status-ok
        - command:
            - /testbin/kopia
            - repository
            - sync-to
            - s3
            - --bucket=my-sync-bucket
            - --access-key=myaccesskey
            - --secret-access-key=mysecretkey
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: throttle_get
    input:
      state: throttled
      throttle_operation: get
      config: /etc/kopia/root.config
    output:
      changed: false
    mocks:
      run_command:
        - *status-ok
        - command:
            - /testbin/kopia
            - repository
            - throttle
            - get
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: "upload-speed-limit: 0"
          err: ''
        - *status-ok

  - id: connect_azure_service_principal
    input:
      state: connected
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: azure
        container: my-container
        storage_account: myaccount
        client_id: cid
        client_secret: csecret
        tenant_id: tid
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - connect
            - azure
            - --container=my-container
            - --storage-account=myaccount
            - --client-id=cid
            - --client-secret=csecret
            - --tenant-id=tid
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: create_gcs_embed_credentials
    input:
      state: created
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: gcs
        bucket: my-gcs-bucket
        credentials_file: /etc/gcs.json
        embed_credentials: true
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - create
            - gcs
            - --bucket=my-gcs-bucket
            - --credentials-file=/etc/gcs.json
            - --embed-credentials
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: create_rclone_with_args
    input:
      state: created
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: rclone
        path: "myremote:backups"
        rclone_exe: /usr/local/bin/rclone
        rclone_args:
          - "--transfers=4"
          - "--checkers=8"
        rclone_env:
          - "RCLONE_CONFIG=/etc/rclone.conf"
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - create
            - rclone
            - --remote-path=myremote:backups
            - --rclone-exe=/usr/local/bin/rclone
            - --rclone-args
            - "--transfers=4"
            - --rclone-args
            - "--checkers=8"
            - --rclone-env
            - RCLONE_CONFIG=/etc/rclone.conf
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: create_sftp_with_password
    input:
      state: created
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: sftp
        path: /backup
        host: sftp.example.com
        username: admin
        sftp_password: sftpsecret
        known_hosts: /root/.ssh/known_hosts
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - create
            - sftp
            - --path=/backup
            - --host=sftp.example.com
            - --username=admin
            - --sftp-password=sftpsecret
            - --known-hosts=/root/.ssh/known_hosts
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok

  - id: create_sftp_external_ssh
    input:
      state: created
      password: secret
      config: /etc/kopia/root.config
      backend:
        provider: sftp
        path: /backup
        host: sftp.example.com
        username: admin
        external: true
        ssh_command: /usr/bin/ssh
        ssh_args:
          - "-o"
          - "StrictHostKeyChecking=no"
    output:
      changed: true
    mocks:
      run_command:
        - *status-empty
        - command:
            - /testbin/kopia
            - repository
            - create
            - sftp
            - --path=/backup
            - --host=sftp.example.com
            - --username=admin
            - --external
            - --ssh-command=/usr/bin/ssh
            - --ssh-args
            - "-o"
            - --ssh-args
            - StrictHostKeyChecking=no
            - --password=secret
            - --config-file=/etc/kopia/root.config
          environ: *env-def
          rc: 0
          out: ''
          err: ''
        - *status-ok
